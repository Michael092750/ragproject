# Local development services. Start with:  docker compose up -d
# Stop with:                                docker compose down
# Stop and wipe data:                       docker compose down -v
services:
  db:
    # Prebuilt Postgres image with the pgvector extension already installed.
    image: pgvector/pgvector:pg16
    container_name: industryiq_db
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: industryiq
    ports:
      # host:container -> reach the DB from your app at localhost:5432
      - "5432:5432"
    volumes:
      # Named volume keeps the data on disk so it survives `docker compose down`.
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d industryiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Milvus standalone (vector store, alternative to pgvector) -------------
  # Milvus Lite (embedded) does not run on Windows, so we run the standalone
  # server, which needs etcd (metadata) + minio (object storage). pgvector above
  # is kept so the two engines can be benchmarked side by side.
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: industryiq_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: industryiq_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    # v2.6.x is the first line with BM25 full-text search (the text_sparse index +
    # BM25 Function in milvusvectorstore.py); v2.4 rejects it ("only IP is the
    # supported metric type for sparse index"). Keep the pymilvus client on the
    # matching 2.6.x line (see pyproject) -- the 3.0.x client targets Milvus 3.0 beta.
    image: milvusdb/milvus:v2.6.19
    container_name: industryiq_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_REGION: us-east-1
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      # host:container -> reach Milvus from host scripts at localhost:19530
      - "19530:19530"
      - "9091:9091"  # health/metrics
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s  # 2.6 standalone needs ~90s to come up; don't count early checks
      timeout: 20s
      retries: 5

  app:
    # Build our own image from the Dockerfile in this directory.
    build: .
    container_name: industryiq_app
    environment:
      # Inside the compose network, the DB host is the service name "db" (not localhost).
      DATABASE_URL: postgresql://rag:ragpass@db:5432/industryiq
      # Which vector store the app uses: "pgvector" (default) or "milvus".
      VECTOR_BACKEND: ${VECTOR_BACKEND:-pgvector}
      # Inside the compose network, Milvus is reachable at the service name "milvus".
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      DEBUG_API_KEY: ${DEBUG_API_KEY:-}
      # Admin ingestion key (POST /admin/ingest); unset -> endpoint disabled (404).
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      # Signs JWT access tokens; unset -> insecure built-in default (dev only).
      JWT_SECRET: ${JWT_SECRET:-}
      # Default to free offline fakes; compose.prod.yml overrides this to "bedrock" on AWS.
      RAG_PROVIDER: ${RAG_PROVIDER:-fake}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Background bulk-ingest scheduler: scans the folder/interval an admin sets
      # via /admin/ingest-job and ingests new/changed files. Set to 0/false to
      # disable the loop entirely. Point the job's path at the mount below.
      INGEST_SCHEDULER_ENABLED: ${INGEST_SCHEDULER_ENABLED:-true}
    volumes:
      # Server-side folder the scheduled ingest reads from. Drop reports under
      # ./reports (one subfolder per category) and set the job path to /data/reports.
      - ./reports:/data/reports:ro
    ports:
      - "8000:8000"
    depends_on:
      # Wait until the database reports healthy before starting the app.
      db:
        condition: service_healthy
      # Milvus is not a hard startup dependency: the store is built lazily on the
      # first request, and the default backend is pgvector. Start it explicitly
      # (or just `docker compose up -d`) when using VECTOR_BACKEND=milvus.

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
