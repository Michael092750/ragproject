name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast checks: lint, type-check, and unit tests (no external services).
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest

  # Integration tests against a real Postgres + pgvector service.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: industryiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d industryiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://rag:ragpass@localhost:5432/industryiq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -m integration --no-cov
